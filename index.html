<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 class="logo">MyPortfolio</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section id="home" class="section">
    <img src="" alt="my-Img">
    <h2>Hello, I'm <span class="highlight">Amit Kumar</span></h2>
    <h3><span id="typing"></span></h3>
</section>

<section id="about" class="section">
    <h2>About Me</h2>
    <p>I am a web developer who loves creating beautiful and functional websites.</p>
</section>

<section id="projects" class="section">
    <h2>My Projects</h2>
    <div class="card-container">
        <div class="card">Project 1</div>
        <div class="card">Project 2</div>
        <div class="card">Project 3</div>
    </div>
</section>

<section id="contact" class="section">
    <h2>Contact Me</h2>

    <form>
        <input type="text" placeholder="Your Name" required><br><br>
        <input type="email" placeholder="Your Email" required><br><br>
        <textarea placeholder="Your Message" required></textarea><br><br>
        <button type="submit">Send Message</button>
    </form>
</section>
<script src="script.js"></script>
</body>
</html>
